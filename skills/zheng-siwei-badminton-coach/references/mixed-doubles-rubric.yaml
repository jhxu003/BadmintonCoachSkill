  category: reset
  priority: 3
  applicable_actions: [mixed_doubles, doubles, serve_receive, smash, drop, backhand]
  required_observations: [footwork_observations.recovery]
  observable_evidence:
    - {path: footwork_observations.recovery, equals: late, label: Learner or partner is not role-ready before the next opponent contact.}
  min_evidence_count: 1
  likely_effect: [The same pressure repeats on the next shot., A technically successful stroke does not transfer into rally control.]
  correction_principle: Finish each shot at the next role, not at the previous contact.
  drills: [zsw-hit-call-reset]
  retest_metrics: [Both players reach named next roles before opponent contact in 8 of 10 patterns.]
  source_ids: [ZSW_BILI_BV1ILCNYVEHW, ZSW_BILI_BV1ZKBNZLEHR, ZSW_BILI_BV1TZHUZIEZQ]
