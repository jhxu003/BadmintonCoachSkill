- rule_id: zsw-serve-without-third-shot-plan
  issue: The serve is isolated from the pair's third-shot plan.
  category: serve_opening
  priority: 1
  applicable_actions: [mixed_doubles, serve_receive]
  required_observations: [phase_observations.third_shot_role]
  observable_evidence:
    - {path: phase_observations.third_shot_role, equals: unclear, label: The serving pair has no visible owner for the expected third shot.}
  min_evidence_count: 1
  likely_effect: [The server or partner hesitates after the return., The opening loses initiative without a technical serve error.]
  correction_principle: Name the likely return lane and third-shot owner before serving.
  drills: [zsw-serve-return-third-shot]
  retest_metrics: [At least 8 of 10 serves produce a role-ready third shot without partner hesitation.]
  source_ids: [ZSW_BILI_BV11O4ZEPEPT, ZSW_BILI_BV1JCKPENEIW]
  confidence: inferred

- rule_id: zsw-passive-receive-route
  issue: The receive does not create an active next exchange.
  category: receive_opening
  priority: 1
  applicable_actions: [mixed_doubles, serve_receive]
  required_observations: [phase_observations.receive_result, phase_observations.next_shot_role]
  observable_evidence:
    - {path: phase_observations.receive_result, equals: passive, label: The receive leaves the pair immediately defending or reaching.}
    - {path: phase_observations.next_shot_role, equals: unclear, label: Neither partner is visibly ready for the next exchange.}
  min_evidence_count: 2
  likely_effect: [The pair gives away the first attacking chance., Both players react after the opponent's next contact.]
  correction_principle: Choose a receive route together with its second-exchange owner.
  drills: [zsw-receive-two-exchange]
  retest_metrics: [At least 7 of 10 receives leave one named partner balanced and racket-ready for the next exchange.]
  source_ids: [ZSW_BILI_BV11O4ZEPEPT, ZSW_BILI_BV1SATTEWEBS, ZSW_BILI_BV1JCKPENEIW]
  confidence: source_backed

