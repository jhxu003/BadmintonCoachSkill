  min_evidence_count: 1
  likely_effect: [The reply is contacted under pressure., The partner cannot form a stable next-shot shape.]
  correction_principle: Preserve a ready split and name the first rear-cover route before the serve.
  drills: [zsw-flick-serve-first-step]
  retest_metrics: [Receiver reaches a balanced contact candidate on 8 of 10 randomized short/flick serves.]
  source_ids: [ZSW_BILI_BV1J6BCEIEAG, ZSW_BILI_BV1AURDY3EPT]
