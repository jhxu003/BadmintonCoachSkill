- rule_id: drop-too-slow
  issue: Drop shot is too slow or too high
  category: overhead_variation
  priority: 25
  applicable_actions: [drop]
  student_profile_fit: [beginner, intermediate, advanced]
  required_observations: [phase_observations.drop_speed]
  observable_evidence:
    - path: phase_observations.drop_speed
      equals: slow_high
      label: Drop trajectory is slow or high enough for the opponent to recover.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for a rear-side view showing base overhead action, contact, trajectory, and recovery.
  likely_effect:
    - Player gets the shuttle over but cannot create pressure.
    - The drop becomes readable because the base overhead action is not credible.
  correction_principle: Rebuild base overhead disguise and compact contact before adding slice detail.
  drills: [drop-disguise-speed-ladder]
  retest_metrics:
    - phase_observations.drop_speed should become fast_controlled
    - phase_observations.disguise should not reveal early
  source_ids: [LH_BILI_SEASON_BV1HZ4Y1A7XQ, LH_BILI_SEASON_BV1UCPREVEJE, LH_BILI_SEASON_BV16WZEYQETA, LH_BILI_SLICE_DROP_SMASH]
  confidence: inferred

- rule_id: drop-early-reveal
  issue: Drop intention is revealed too early
  category: overhead_variation
  priority: 30
  applicable_actions: [drop, smash]
  student_profile_fit: [intermediate, advanced]
  required_observations: [phase_observations.disguise]
  observable_evidence:
    - path: phase_observations.disguise
      equals: early_reveal
      label: Preparation reveals the drop before the contact window.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for frames from preparation through contact so base overhead similarity can be judged.
  likely_effect:
    - Opponent starts forward before the shuttle is hit.
    - Advanced slice or drop cues fail because the base action is not hidden.
  correction_principle: Keep the preparation close to the base overhead action, then vary contact late.
  drills: [drop-disguise-speed-ladder]
  retest_metrics:
    - phase_observations.disguise should become late
  source_ids: [LH_BILI_SEASON_BV1QC4Y1R7JP, LH_BILI_SEASON_BV13F5EZDEN4, LH_BILI_SEASON_BV1PCQPYJERM]
  confidence: hypothesis

- rule_id: drop-overcut-face
  issue: Racket face over-cuts the shuttle
  category: overhead_variation
  priority: 35
  applicable_actions: [drop]
  student_profile_fit: [intermediate, advanced]
  required_observations: [phase_observations.racket_face]
  observable_evidence:
    - path: phase_observations.racket_face
      equals: over_cut
      label: Racket face cuts too much and loses forward speed or control.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for a contact close-up or high-fps side view before diagnosing face-angle detail.
  likely_effect:
    - Shuttle floats, sprays, or loses the intended line.
    - Player keeps adding wrist detail instead of stabilizing contact.
  correction_principle: Stabilize the face and contact window before increasing slice amount.
  drills: [drop-face-window-check]
  retest_metrics:
    - phase_observations.racket_face should become controlled_slice
  source_ids: [LH_BILI_SEASON_BV1XCD8YNENF, LH_BILI_SEASON_BV1DBYRBCEQF, LH_BILI_SEASON_BV14EBTBOEXK]
  confidence: hypothesis

- rule_id: drop-direction-mismatch
  issue: Drop direction skill does not transfer across target lines
  category: overhead_variation
  priority: 28
  applicable_actions: [drop]
  student_profile_fit: [intermediate, advanced]
  required_observations: [phase_observations.drop_direction_control]
  observable_evidence:
    - path: phase_observations.drop_direction_control
      equals: one_direction_only
      label: Player can perform one drop direction but cannot transfer the action to another target line.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for both successful and failed drop directions before diagnosing target-line transfer.
  likely_effect:
    - The player treats straight and cross drop as the same action when the contact line differs.
    - Adding more slice detail may not fix the missing direction.
  correction_principle: Use the known direction as a reference, then rebuild the missing target line as a separate task.
  drills: [drop-variant-target-line]
  retest_metrics:
    - phase_observations.drop_direction_control should become two_direction_control
  source_ids: [LH_BILI_SEASON_BV1S1VKBSEAB]
  evidence_ids: [pilot-011-w001-split-line-problem-by-direction, pilot-011-w002-crosscourt-contact-explains-straight-gap, pilot-011-w003-teach-straight-through-known-crosscourt-feel]
  evidence_status: timestamp_candidate
  confidence: hypothesis

- rule_id: contact-point-too-low
  issue: Drop or slide contact is too low for the intended variant
  category: overhead_variation
  priority: 70
  applicable_actions: [drop]
  student_profile_fit: [beginner, intermediate, advanced]
  required_observations: [contact_point, phase_observations.drop_variant]
  observable_evidence:
    - path: contact_point
      equals: too_low
      label: Contact occurs below the playable height required by the stated drop or slide variant.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for a side view showing arrival and contact height plus the intended drop variant and target line.
  likely_effect:
    - Low contact can remove angle, disguise, or speed options and force compensatory wrist action.
    - The same contact may be acceptable for a passive rear-point solution but wrong for a front-high fast or light drop.
  correction_principle: Restore arrival and a variant-appropriate contact height before changing slice amount or racket-face cue.
  drills: [drop-variant-target-line]
  retest_metrics:
    - contact_point should become variant_appropriate_height
    - target line and recovery should remain stable for the selected variant
  source_ids: [LH_BILI_SEASON_BV1S1VKBSEAB, LH_BILI_SEASON_BV1QZ421U7C6, LH_BILI_SEASON_BV1PCQPYJERM]
  evidence_ids: [pilot-027-w002-light-drop-high-point-and-slice, pilot-029-w002-front-point-slide-versus-rear-point-slide]
  evidence_status: timestamp_candidate
  confidence: hypothesis

- rule_id: slide-drop-transfer-fails
  issue: Front-point slide action does not transfer to passive rear point
  category: overhead_variation
  priority: 33
  applicable_actions: [drop]
  student_profile_fit: [intermediate, advanced, match_pressure_breakdown]
  required_observations: [phase_observations.slide_context, contact_point]
  observable_evidence:
    - path: phase_observations.slide_context
      equals: passive_rear_point
      label: Slide drop is being attempted from a passive rear overhead point.
    - path: contact_point
      in: [behind_head, rear_passive, too_far_back]
      label: Contact point is not the comfortable front point where the player's slide action already works.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for a clip showing both the comfortable front-point slide and the failed passive rear-point slide.
  likely_effect:
    - The player blames footwork while the grip and stroke model are not adapted to the passive point.
    - A front-point fly-swatter model fails under rear overhead pressure.
  correction_principle: Rebuild the passive rear-point slide as its own grip, face, and contact model instead of copying the front-point version.
  drills: [drop-variant-target-line]
  retest_metrics:
    - phase_observations.slide_context should become rear_point_variant_stable
    - phase_observations.racket_face should become rear_slide_ready
  source_ids: [LH_BILI_SEASON_BV1PCQPYJERM]
  evidence_ids: [pilot-029-w001-passive-overhead-slide-not-only-footwork, pilot-029-w002-front-point-slide-versus-rear-point-slide]
  evidence_status: timestamp_candidate
  confidence: hypothesis

- rule_id: grip-face-mismatch
  issue: Grip and racket face do not match the chosen drop variant
  category: overhead_variation
  priority: 34
  applicable_actions: [drop]
  student_profile_fit: [intermediate, advanced]
  required_observations: [phase_observations.drop_variant, phase_observations.racket_face]
  observable_evidence:
    - path: phase_observations.racket_face
      equals: variant_mismatch
      label: Racket face does not match the intended fast, light, slice, or slide-drop variant.
    - path: phase_observations.grip_shape
      equals: variant_mismatch
      label: Grip shape does not support the intended drop variant.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for hand/racket-face visibility and the intended drop variant before prescribing grip or face detail.
  likely_effect:
    - Fast drop lacks force or light drop floats too high.
    - The player adds wrist or slice without first matching the variant geometry.
  correction_principle: Name the drop variant first, then align grip, face, contact height, and target line to that variant.
  drills: [drop-variant-target-line, drop-face-window-check]
  retest_metrics:
    - phase_observations.racket_face should become variant_matched
    - phase_observations.drop_speed should match selected_variant
  source_ids: [LH_BILI_SEASON_BV1QZ421U7C6, LH_BILI_SEASON_BV1XDLEZQERY]
  evidence_ids: [pilot-015-w001-slide-drop-body-direction, pilot-015-w002-current-slide-uses-early-internal-rotation, pilot-027-w001-fast-drop-needs-force, pilot-027-w002-light-drop-high-point-and-slice, pilot-027-w003-fast-drop-grip-and-racket-face]
  evidence_status: timestamp_candidate
  confidence: hypothesis
