- plan_id: drop-slide-variant-rebuild
  name: Drop and slide variant rebuild plan
  suitable_for:
    - intermediate-chain-ready
    - match-pressure-breakdown
  structure:
    - identify straight, cross, light, fast, front-point slide, or passive rear-point slide as separate tasks
    - retest contact height and racket-face state for the chosen variant
    - transfer one known direction to the missing target line
    - add body-direction and recovery constraints after the variant is stable
  output_requirements:
    - do not merge all drops into one diagnosis
    - include target-line, contact-height, racket-face, and speed metrics
  stop_conditions:
    - grip or racket face is not visible
    - the player cannot reproduce the base overhead preparation
    - passive rear-point slide is being judged from a front-point clip
