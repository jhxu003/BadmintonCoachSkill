- plan_id: overhead-framework-selector
  name: Overhead framework selector plan
  suitable_for:
    - beginner-arm-dominant
    - intermediate-chain-ready
    - match-pressure-breakdown
  structure:
    - state the target ball effect and incoming-ball condition
    - test standard compact frame under light hit
    - compare fast, heavy, high, low, and flexible frame tradeoffs only after standard frame passes
    - pick one frame for the current task and one retest condition
  output_requirements:
    - explain why this frame fits the player's body and goal
    - name the tradeoff the player accepts, such as power ceiling, recovery cost, or flexibility
  stop_conditions:
    - player copies an elite frame without the prerequisites
    - social discomfort or lack of confidence prevents visible athletic framing
    - shoulder or elbow discomfort appears
