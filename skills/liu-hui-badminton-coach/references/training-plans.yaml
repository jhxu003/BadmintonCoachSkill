- plan_id: jump-smash-readiness
  name: Jump-smash readiness plan
  suitable_for:
    - intermediate-chain-ready
    - match-pressure-breakdown
  structure:
    - compact standard-frame freeze
    - standing smash time-budget retest
    - racket-lift speed before takeoff
    - small-hop contact-window ladder
    - submaximal jump landing and recovery retest
  output_requirements:
    - block jump progression when standing frame or racket lift consumes the swing window
    - include contact-window and recovery metrics, not only shuttle speed
  stop_conditions:
    - knee, ankle, back, shoulder, or elbow discomfort appears
    - jump height makes contact point worse
    - landing recovery is not available before the next feed
