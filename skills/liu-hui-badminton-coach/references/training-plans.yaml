- plan_id: one-priority-daily
  name: One-priority daily plan
  suitable_for:
    - beginner-arm-dominant
    - mobility-limited-adult
  structure:
    - 5 minutes slow structure check
    - 10 minutes one drill family
    - 5 minutes same-angle retest
  output_requirements:
    - one main priority
    - one concrete drill
    - one retest metric
  stop_conditions:
    - pain or discomfort appears
    - required observation is not visible
    - quality collapses when speed increases
  source_ids: [LH_BILI_LEARNING_ORDER, LH_BILI_SEASON_BV19G4Y1S75F]
  evidence_status: inferred

- plan_id: overhead-rebuild
  name: Overhead rebuild plan
  suitable_for:
    - beginner-arm-dominant
    - intermediate-chain-ready
  structure:
    - arrival and contact window
    - top-elbow and racket-side frame
    - elbow-before-wrist sequence
    - hip timing and release only after frame holds
  output_requirements:
    - do not prescribe pronation before contact and frame pass
    - retest contact point and elbow sequence
  stop_conditions:
    - shoulder or elbow discomfort
    - contact remains behind head under slow practice
