- plan_id: hip-drive-rebuild
  name: Foot-ground hip-drive rebuild plan
  suitable_for:
    - beginner-arm-dominant
    - intermediate-chain-ready
  structure:
    - check incoming-ball time before requiring full kicking-turning mechanics
    - set rear-foot direction and heel/forefoot pressure
    - rehearse foot push before hip turn
    - connect pelvis turn to relaxed upper body and arm release
    - retest whether the shuttle length or downward pressure improves without extra arm force
  output_requirements:
    - separate rear-foot orientation, push direction, hip turn, and upper-body relaxation
    - include lower-body visibility as an evidence requirement
  stop_conditions:
    - rear foot or ground contact is not visible in the video
    - knee, ankle, or back discomfort appears
    - ball condition does not allow enough time for the full chain
  source_ids: [LH_BILI_SEASON_BV1HBYRBCECE, LH_BILI_SEASON_BV1KM41147M1, LH_BILI_SEASON_BV1CM42157US, LH_BILI_SEASON_BV1AYKWBJEUV]
