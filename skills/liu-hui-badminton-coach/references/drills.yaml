- drill_id: rear-court-arrival-shadow
  name: Rear-court arrival shadow
  target_issues: [late-arrival]
  steps:
    - Start from center base.
    - Move to rear corner without swinging.
    - Stop balanced before the imaginary contact.
    - Return to center without crossing recovery steps.
  dosage: 5 sets of 8 reps per rear corner.
  retest_metrics:
    - arrival_timing improves from late to on_time
    - recovery improves from slow to normal

- drill_id: contact-window-freeze
  name: Front-high contact window freeze
  target_issues: [contact-point-behind]
  steps:
    - Shadow swing slowly.
    - Freeze at the intended contact point.
    - Check the hand is in front of the head and above shoulder level.
    - Resume only after the position is stable.
  dosage: 3 sets of 15 slow reps.
  retest_metrics:
    - contact_point changes from behind_head to front_high

- drill_id: top-elbow-freeze
  name: Top-elbow freeze swing
  target_issues: [low-elbow]
  steps:
    - Turn sideways and set the racket-side frame.
    - Raise the elbow near shoulder line before acceleration.
    - Hold for one second.
    - Swing out slowly with elbow leading wrist.
  dosage: 3 sets of 12 reps.
  retest_metrics:
    - elbow_height_before_hit changes from below_shoulder to near_shoulder
    - wrist_elbow_sequence changes to elbow_before_wrist

- drill_id: racket-frame-wall-check
  name: Racket-side frame wall check
  target_issues: [collapsed-racket-structure]
  steps:
    - Stand side-on near a wall.
    - Set the racket arm without letting shoulder and elbow collapse forward.
    - Repeat the frame set before shadow swing.
  dosage: 3 sets of 10 frame checks.
  retest_metrics:
    - racket_side_structure changes from collapsed to stable

- drill_id: slow-chain-throw
  name: Slow hip-to-elbow chain throw
  target_issues: [late-hip-rotation, pronation-whip-misread]
  steps:
    - Start with slow side-on preparation.
    - Rotate hip/trunk first.
    - Let elbow lead and wrist release last.
    - Keep speed under 50 percent.
  dosage: 4 sets of 8 slow reps.
  retest_metrics:
    - hip_shoulder_sequence changes from late_hip to hip_before_arm
    - wrist_elbow_sequence changes to elbow_before_wrist

- drill_id: complete-follow-through-line
  name: Complete follow-through line
  target_issues: [short-follow-through]
  steps:
    - Swing at low speed.
    - Let the arm finish naturally across the body.
    - Hold the finish for one second.
  dosage: 3 sets of 15 reps.
  retest_metrics:
    - follow_through changes from short to complete

- drill_id: front-court-arrival-shadow
  name: Front-court arrival shadow
  target_issues: [late-front-arrival]
  steps:
    - Start from center base.
    - Split and move to the front corner.
    - Freeze with racket face ready before the imaginary contact.
    - Exit back toward base after the touch.
  dosage: 5 sets of 6 reps per front corner.
  retest_metrics:
    - front_arrival_timing improves from late to on_time

- drill_id: backhand-contact-height-check
  name: Backhand contact-height check
  target_issues: [backhand-low-contact]
  steps:
    - Feed to the backhand side at controlled speed.
    - Pause at the contact frame.
    - Mark whether contact is still at playable height.
    - Recover before the next feed.
  dosage: 4 sets of 8 controlled feeds.
  retest_metrics:
    - contact_point changes from low to playable_height

- drill_id: compact-receive-ready
  name: Compact receive ready
  target_issues: [receive-large-preparation]
  steps:
    - Start in receive posture with racket ready.
    - Receive a short or body-line feed without backswing.
    - Recover immediately for the second shot.
  dosage: 6 sets of 10 receives.
  retest_metrics:
    - preparation_size changes from large to compact
    - second_shot_ready becomes true

- drill_id: doubles-after-shot-recovery
  name: Doubles after-shot recovery
  target_issues: [doubles-watch-after-hit]
  steps:
    - Hit a drive, block, or lift in a two-player shape.
    - Move to the role-specific coverage position.
    - Play the next feed with racket ready.
  dosage: 5 sets of 8 two-shot patterns.
  retest_metrics:
    - after_shot_recovery changes from watching to role_ready

- drill_id: drop-disguise-speed-ladder
  name: Drop disguise speed ladder
  target_issues: [drop-too-slow, drop-early-reveal]
  steps:
    - Shadow a clear or smash preparation and freeze at the same contact window.
    - Hit five base overhead feeds, then five drops without changing preparation timing.
    - Keep the contact compact and recover immediately after the drop.
    - Retest whether the drop is fast enough without revealing early.
  dosage: 4 rounds of 5 base overheads plus 5 drops.
  retest_metrics:
    - drop_speed changes from slow_high to fast_controlled
    - disguise changes from early_reveal to late

- drill_id: drop-face-window-check
  name: Drop face-window check
  target_issues: [drop-overcut-face]
  steps:
    - Start with a slow overhead preparation.
    - Freeze at contact and check the racket face is not over-cutting.
    - Hit controlled drops to two target zones.
    - Increase slice only if the shuttle keeps forward speed and line control.
  dosage: 5 sets of 8 controlled drops.
  retest_metrics:
    - racket_face changes from over_cut to controlled_slice

- drill_id: jammed-spacing-reset
  name: Jammed spacing reset
  target_issues: [body-jammed-spacing]
  steps:
    - Feed body-line shuttles at controlled speed.
    - Create a small spacing adjustment before contact.
    - Keep racket preparation in front of the body.
    - Recover for the next feed instead of admiring the first contact.
  dosage: 6 sets of 8 body-line feeds.
  retest_metrics:
    - spacing changes from too_close to playable
    - pressure_state no longer records body_jammed

- drill_id: compact-drive-exchange
  name: Compact drive exchange
  target_issues: [drive-large-preparation, exchange-second-shot-not-ready]
  steps:
    - Start with racket ready in front of the body.
    - Exchange two flat feeds without backswing.
    - Reset the racket immediately after each contact.
    - Count only rallies where the second shot is ready.
  dosage: 5 sets of 12 two-shot exchanges.
  retest_metrics:
    - preparation_size changes from large to compact
    - second_shot_ready becomes true

- drill_id: pressure-transfer-ladder
  name: Pressure transfer ladder
  target_issues: [drill-form-rally-breakdown]
  steps:
    - Perform the corrected movement slowly for clean structure.
    - Repeat with controlled feed and one recovery step.
    - Add an uncertain second shot.
    - Finish with a short rally retest that matches the original failure.
  dosage: 3 rounds of slow, feed, two-shot, and rally-pressure phases.
  retest_metrics:
    - drill_form_ok_rally_breaks becomes false
    - pressure_success_rate improves from the previous retest

- drill_id: rally-context-retake
  name: Rally-context retake
  target_issues: [tactical-context-missing]
  steps:
    - Record from a view that includes both players or relevant partner coverage.
    - Include the opponent contact before the target stroke.
    - Keep filming through recovery and the next opponent contact.
    - Re-run technical diagnosis only after the rally context is visible.
  dosage: Capture 3 comparable rally clips.
  retest_metrics:
    - tactical_context_visible becomes true

- drill_id: reduced-load-safety-reset
  name: Reduced-load safety reset
  target_issues: [pain-reported-load-reduction]
  steps:
    - Stop high-intensity swings or jumps for the session.
    - Rehearse the same movement at lower speed and smaller range.
    - Keep only pain-free repetitions.
    - Escalate to a qualified professional if pain persists.
  dosage: 2 to 3 low-speed sets only if pain-free.
  retest_metrics:
    - pain_reported becomes false before intensity increases

- drill_id: equipment-fit-retest
  name: Equipment-fit retest
  target_issues: [racket-too-heavy-for-stage, racket-balance-mismatch, racket-torsion-mismatch, shaft-stiffness-mismatch]
  steps:
    - Record the same controlled feed and movement target with the current racket.
    - Repeat with one known equipment variable changed, such as weight class, balance point, torsional stability, or shaft stiffness.
    - Keep feed, effort, target, and technical cue constant across conditions.
    - Compare preparation timing, frame stability, contact dispersion, output, tension, and recovery.
    - Keep the technical target unchanged while testing equipment effect.
  dosage: 3 sets of 8 controlled repetitions per racket condition.
  retest_metrics:
    - racket_weight_fit changes from too_heavy_for_stage to manageable
    - the selected equipment-fit field becomes manageable or matched_for_task
    - racket_side_structure stays stable and directional dispersion does not worsen

- drill_id: arm-path-reset
  name: Arm-path reset
  target_issues: [big-arm-dominant-swing, swing-path-offline]
  steps:
    - Set the racket-side frame slowly.
    - Move from frame to elbow lead without pulling the whole arm early.
    - Swing through the intended contact line at low speed.
    - Finish naturally and check the path before adding speed.
  dosage: 4 sets of 10 slow path reps.
  retest_metrics:
    - arm_path changes from big_arm_pull to frame_to_release
    - swing_path changes from offline to through_contact

- drill_id: deceleration-release-line
  name: Deceleration release line
  target_issues: [deceleration-missing, upper-body-tension, forced-follow-through]
  steps:
    - Hit at half speed with a clear contact target.
    - Let the racket release and slow down naturally after contact.
    - Avoid stopping the swing with shoulder, elbow, or wrist tension.
    - Increase speed only if the finish stays relaxed.
  dosage: 4 sets of 8 half-speed releases.
  retest_metrics:
    - deceleration changes from forced_stop or cannot_unload to natural
    - follow_through becomes complete

- drill_id: jump-contact-ladder
  name: Jump contact ladder
  target_issues: [jump-contact-window-missed]
  steps:
    - Start with a grounded contact-window check.
    - Add a small hop without changing the contact target.
    - Add a controlled two-foot takeoff only after timing stays stable.
    - Stop if jump height makes contact worse.
  dosage: 3 rounds of grounded, hop, and controlled-jump contacts.
  retest_metrics:
    - jump_contact changes from missed_window to front_high_window

- drill_id: jump-landing-recovery
  name: Jump landing recovery
  target_issues: [jump-landing-recovery-unstable]
  steps:
    - Jump at submaximal height.
    - Land balanced before the next movement.
    - Recover to base or partner-aware position.
    - Count only reps where landing and recovery are stable.
  dosage: 4 sets of 6 controlled jump-smash exits.
  retest_metrics:
    - landing_recovery changes from unstable to stable
    - recovery changes from slow to normal

- drill_id: time-budget-racket-lift
  name: Time-budget racket lift
  target_issues: [slow-racket-preparation-consumes-window, jump-contact-window-missed]
  steps:
    - Start from the exact incoming-ball scenario that created pressure.
    - Shadow the racket lift only and stop at the prepared hitting frame.
    - Count whether the frame is ready before the imaginary shuttle reaches contact.
    - Add the hit only when the racket lift leaves a visible waiting moment.
  dosage: 5 rounds of 6 preparation-only reps plus 6 controlled hits.
  retest_metrics:
    - preparation_time changes from consumes_swing_window to early_ready
    - jump_contact changes from missed_window to usable_window
  evidence_status: timestamp_candidate
  source_ids: [LH_BILI_SEASON_BV1X9QBBBETX, LH_BILI_SEASON_BV1ZBWEZEELW]
  evidence_ids: [pilot-002-w002-time-space-budget, pilot-019-w001-hangtime-time-budget, pilot-019-w002-slow-racket-lift-consumes-hangtime, pilot-019-w003-fast-preparation-creates-waiting-time]

- drill_id: compact-standard-frame-freeze
  name: Compact standard-frame freeze
  target_issues: [collapsed-racket-structure, low-elbow, big-arm-dominant-swing]
  steps:
    - Set the overhead frame without swinging.
    - Check that the upper arm and forearm stay compact instead of wide open.
    - Keep the elbow directed diagonally back and the racket head usable.
    - Swing only after the frame can be repeated without shoulder collapse.
  dosage: 4 sets of 10 freeze-check-swing reps.
  retest_metrics:
    - racket_side_structure changes from wide_open or collapsed to compact_stable
    - elbow_height_before_hit changes from below_shoulder to usable_frame_height
  evidence_status: timestamp_candidate
  source_ids: [LH_BILI_SEASON_BV1CRFTZBEK7, LH_BILI_SEASON_BV1V6ZABTEUE]
  evidence_ids: [pilot-004-w001-standard-frame-small-angle, pilot-004-w002-textbook-frame-under-90, pilot-018-w004-standard-frame-for-amateurs]

- drill_id: framework-a-b-selector
  name: Framework A/B selector
  target_issues: [frame-goal-mismatch, pro-model-copying]
  steps:
    - Define the incoming-ball condition, intended shot effect, and recovery requirement before choosing a frame.
    - Record a compact or lower-cost frame and one candidate high, heavy, fast, or elite-style frame under the same feed.
    - Compare contact quality, output, balance, effort, and next-shot recovery instead of copying appearance.
    - Keep the simplest frame that achieves the intended effect without exceeding the player's prerequisites or load tolerance.
  dosage: 3 sets of 8 controlled repetitions per candidate frame.
  retest_metrics:
    - frame_goal_fit changes from mismatched to task_matched
    - frame_selection_basis changes from copied_elite_model_without_prerequisites to player_task_evidence
    - recovery quality does not worsen under the selected frame
  evidence_status: timestamp_candidate
  source_ids: [LH_BILI_FAV_BV15PBRB6EDK, LH_BILI_SEASON_BV1BI4Y1Q7EH, LH_BILI_SEASON_BV1NF421X7JG]
  evidence_ids: [pilot-012-w001-advanced-frame-prerequisites, pilot-012-w002-small-fast-frame-pros, pilot-012-w003-small-fast-frame-limits, pilot-013-w001-frame-variants-change-ball-effect, pilot-026-w001-no-perfect-technique, pilot-026-w003-high-frame-locks-low-frame-flexes]

- drill_id: rear-foot-horizontal-hip-drive
  name: Rear-foot horizontal hip-drive
  target_issues: [late-hip-rotation, rear-foot-orientation-blocks-hip]
  steps:
    - Place the rear foot so it can support hip turn instead of pointing straight forward.
    - Sink slightly into the leg and feel pressure through the forefoot.
    - Push from the foot to turn the pelvis without pulling the shoulder first.
    - Add a slow overhead swing only after the hip turns from the foot push.
  dosage: 4 sets of 8 lower-body-only reps plus 8 slow swings.
  retest_metrics:
    - rear_foot_orientation changes from forward or diagonal_blocks_turn to rotation_enabled
    - hip_shoulder_sequence changes from no_hip_drive to foot_drives_hip
  evidence_status: timestamp_candidate
  source_ids: [LH_BILI_SEASON_BV1KM41147M1, LH_BILI_SEASON_BV1CM42157US]
  evidence_ids: [pilot-007-w002-rear-foot-orientation, pilot-007-w003-heel-lift-and-upward-push, pilot-025-w001-hip-drive-foot-checkpoints, pilot-025-w002-horizontal-foot-enables-hip-turn]

- drill_id: elbow-track-arm-segment-transfer
  name: Elbow-track arm-segment transfer
  target_issues: [big-arm-dominant-swing, pronation-whip-misread]
  steps:
    - Swing slowly while tracking whether the elbow keeps traveling through the whole hit.
    - Stop the upper arm near the transfer point and let the forearm and racket continue.
    - Keep the grip from turning into a fly-swatter face.
    - Add speed only when the forearm release happens after upper-arm stabilization.
  dosage: 5 sets of 6 slow transfer reps plus 6 moderate-speed reps.
  retest_metrics:
    - arm_path changes from big_arm_pull to upper_arm_stabilizes
    - wrist_elbow_sequence changes from no_forearm_overtake to forearm_releases_after_elbow
  evidence_status: timestamp_candidate
  source_ids: [LH_BILI_SEASON_BV1P4DGYRE8B, LH_BILI_SEASON_BV19C4Y1S7Z2]
  evidence_ids: [pilot-028-w001-elbow-position-diagnoses-upper-arm, pilot-028-w002-upper-arm-stops-to-transfer-force, pilot-028-w003-internal-rotation-unloads-wrist-force, pilot-008-w003-deep-front-point-blocks-internal-rotation, pilot-008-w004-force-chain-break]

- drill_id: drop-variant-target-line
  name: Drop variant target-line transfer
  target_issues: [drop-direction-mismatch, contact-point-too-low, grip-face-mismatch]
  steps:
    - Pick one known usable drop direction and one missing direction.
    - Mark the target line visually on court or with a feeder cue.
    - Keep the known slice feel while changing only the court reference.
    - Retest straight, cross, fast, and light variants as separate skills.
  dosage: 4 rounds of 6 known-direction drops plus 6 target-transfer drops.
  retest_metrics:
    - drop_direction_control changes from one_direction_only to two_direction_control
    - racket_face changes from grip_face_mismatch to variant_matched
  evidence_status: timestamp_candidate
  source_ids: [LH_BILI_SEASON_BV1S1VKBSEAB, LH_BILI_SEASON_BV1QZ421U7C6, LH_BILI_SEASON_BV1PCQPYJERM]
  evidence_ids: [pilot-011-w001-split-line-problem-by-direction, pilot-011-w002-crosscourt-contact-explains-straight-gap, pilot-011-w003-teach-straight-through-known-crosscourt-feel, pilot-027-w001-fast-drop-needs-force, pilot-027-w002-light-drop-high-point-and-slice, pilot-029-w002-front-point-slide-versus-rear-point-slide]

- drill_id: china-jump-short-contact
  name: China-jump short ground contact
  target_issues: [foot-switch-cost, long-ground-contact, slow-recovery]
  steps:
    - Start from half-side rear-court posture without switching feet.
    - Make a small hit-and-land rhythm where ground contact stays short.
    - Exit immediately into the next recovery step.
    - Count only reps where the no-foot-switch purpose and recovery route are preserved.
  dosage: 5 sets of 6 controlled China-jump rhythm reps.
  retest_metrics:
    - foot_switch changes from true to false
    - ground_contact changes from long_dragging to short_elastic
    - recovery changes from slow to connected_next_step
  evidence_status: timestamp_candidate
  source_ids: [LH_BILI_SEASON_BV1NWRRBTEDY]
  evidence_ids: [pilot-017-w001-china-jump-no-foot-switch-purpose, pilot-017-w002-foot-switch-hurts-recovery, pilot-017-w003-half-side-fast-power, pilot-017-w004-rhythm-and-short-ground-contact]

- drill_id: wrist-contact-segmentation
  name: Wrist contact segmentation
  target_issues: [wrist-force-scattered, contact-point-too-forward, forced-follow-through]
  steps:
    - Hit at slow speed and pause just before contact.
    - Check whether contact is high enough and not too far forward.
    - Release through contact and pause again after the force exits.
    - Reconnect the segmented movement into a smooth swing only after force feels concentrated.
  dosage: 4 sets of 8 segmented reps plus 8 smooth retest reps.
  retest_metrics:
    - contact_point changes from too_forward to high_slightly_back
    - force_release changes from scattered to concentrated_near_contact
    - follow_through changes from forced_stop to natural_release
  evidence_status: timestamp_candidate
  source_ids: [LH_BILI_SEASON_BV1BF6SYTEGZ]
  evidence_ids: [pilot-030-w001-diagnose-wrist-before-teaching, pilot-030-w002-concentrated-force-and-contact-point, pilot-030-w003-segment-force-release-and-follow-through, pilot-030-w004-higher-back-contact-and-earlier-rotation]
