- drill_id: rear-court-arrival-shadow
  name: Rear-court arrival shadow
  target_issues: [late-arrival]
  steps:
    - Start from center base.
    - Move to rear corner without swinging.
    - Stop balanced before the imaginary contact.
    - Return to center without crossing recovery steps.
  dosage: 5 sets of 8 reps per rear corner.
  retest_metrics:
    - arrival_timing improves from late to on_time
    - recovery improves from slow to normal

- drill_id: contact-window-freeze
  name: Front-high contact window freeze
  target_issues: [contact-point-behind]
  steps:
    - Shadow swing slowly.
    - Freeze at the intended contact point.
    - Check the hand is in front of the head and above shoulder level.
    - Resume only after the position is stable.
  dosage: 3 sets of 15 slow reps.
  retest_metrics:
    - contact_point changes from behind_head to front_high

- drill_id: top-elbow-freeze
  name: Top-elbow freeze swing
  target_issues: [low-elbow]
  steps:
    - Turn sideways and set the racket-side frame.
    - Raise the elbow near shoulder line before acceleration.
    - Hold for one second.
    - Swing out slowly with elbow leading wrist.
  dosage: 3 sets of 12 reps.
  retest_metrics:
    - elbow_height_before_hit changes from below_shoulder to near_shoulder
    - wrist_elbow_sequence changes to elbow_before_wrist

- drill_id: racket-frame-wall-check
  name: Racket-side frame wall check
  target_issues: [collapsed-racket-structure]
  steps:
    - Stand side-on near a wall.
    - Set the racket arm without letting shoulder and elbow collapse forward.
    - Repeat the frame set before shadow swing.
  dosage: 3 sets of 10 frame checks.
  retest_metrics:
    - racket_side_structure changes from collapsed to stable

- drill_id: slow-chain-throw
  name: Slow hip-to-elbow chain throw
  target_issues: [late-hip-rotation, pronation-whip-misread]
  steps:
    - Start with slow side-on preparation.
    - Rotate hip/trunk first.
    - Let elbow lead and wrist release last.
    - Keep speed under 50 percent.
  dosage: 4 sets of 8 slow reps.
  retest_metrics:
    - hip_shoulder_sequence changes from late_hip to hip_before_arm
    - wrist_elbow_sequence changes to elbow_before_wrist

- drill_id: complete-follow-through-line
  name: Complete follow-through line
  target_issues: [short-follow-through]
  steps:
    - Swing at low speed.
    - Let the arm finish naturally across the body.
    - Hold the finish for one second.
  dosage: 3 sets of 15 reps.
  retest_metrics:
    - follow_through changes from short to complete

- drill_id: front-court-arrival-shadow
  name: Front-court arrival shadow
  target_issues: [late-front-arrival]
  steps:
    - Start from center base.
    - Split and move to the front corner.
    - Freeze with racket face ready before the imaginary contact.
    - Exit back toward base after the touch.
  dosage: 5 sets of 6 reps per front corner.
  retest_metrics:
    - front_arrival_timing improves from late to on_time

- drill_id: backhand-contact-height-check
  name: Backhand contact-height check
  target_issues: [backhand-low-contact]
  steps:
    - Feed to the backhand side at controlled speed.
    - Pause at the contact frame.
    - Mark whether contact is still at playable height.
    - Recover before the next feed.
  dosage: 4 sets of 8 controlled feeds.
  retest_metrics:
    - contact_point changes from low to playable_height

- drill_id: compact-receive-ready
  name: Compact receive ready
  target_issues: [receive-large-preparation]
  steps:
    - Start in receive posture with racket ready.
    - Receive a short or body-line feed without backswing.
    - Recover immediately for the second shot.
  dosage: 6 sets of 10 receives.
  retest_metrics:
    - preparation_size changes from large to compact
    - second_shot_ready becomes true

- drill_id: doubles-after-shot-recovery
  name: Doubles after-shot recovery
  target_issues: [doubles-watch-after-hit]
  steps:
    - Hit a drive, block, or lift in a two-player shape.
    - Move to the role-specific coverage position.
    - Play the next feed with racket ready.
  dosage: 5 sets of 8 two-shot patterns.
  retest_metrics:
    - after_shot_recovery changes from watching to role_ready
