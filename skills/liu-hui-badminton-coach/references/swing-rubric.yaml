      equals: fly_swatter
      label: Grip resembles a fly-swatter shape instead of supporting rotation and release.
    - path: phase_observations.racket_face
      equals: fly_swatter
      label: Racket face stays fly-swatter-like through preparation or contact.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for a clear hand and racket-face view before diagnosing grip-driven release problems.
  likely_effect:
    - Player presses the wrist or pulls the upper arm instead of releasing through rotation.
