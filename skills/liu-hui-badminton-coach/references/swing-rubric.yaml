- rule_id: wrist-force-scattered
  issue: Wrist force is scattered instead of concentrated near contact
  category: swing_path
  priority: 44
  applicable_actions: [high_clear, smash]
  student_profile_fit: [beginner, intermediate, advanced]
  required_observations: [phase_observations.force_release]
  observable_evidence:
    - path: phase_observations.force_release
      equals: scattered
      label: Force release is spread through the swing instead of concentrated near the intended contact.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for slow-motion contact and follow-through frames before diagnosing wrist force concentration.
  likely_effect:
    - The player swings hard but the shuttle does not receive a clean lift or press.
    - Follow-through may become forced because the release point is unclear.
  correction_principle: Segment the contact and follow-through first, then reconnect the wrist contribution into the chain.
  drills: [wrist-contact-segmentation]
  retest_metrics:
    - phase_observations.force_release should become concentrated_near_contact
    - follow_through should become natural_release
