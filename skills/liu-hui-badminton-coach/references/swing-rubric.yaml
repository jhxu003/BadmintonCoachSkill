- rule_id: big-arm-dominant-swing
  issue: Swing is dominated by big-arm pulling
  category: swing_path
  priority: 38
  applicable_actions: [high_clear, smash, drop, drive, backhand]
  student_profile_fit: [beginner, intermediate, arm_dominant]
  required_observations: [phase_observations.arm_path]
  observable_evidence:
    - path: phase_observations.arm_path
      equals: big_arm_pull
      label: Arm path is dominated by big-arm pulling instead of a usable frame-to-release sequence.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for preparation, acceleration, contact, and follow-through frames before diagnosing arm path.
  likely_effect:
    - Player loses speed despite trying harder.
    - Wrist or internal-rotation cues may be misapplied because the arm path is wrong first.
  correction_principle: Rebuild arm path through frame, elbow lead, and natural follow-through before adding hand-speed detail.
  drills: [arm-path-reset]
  retest_metrics:
    - phase_observations.arm_path should become frame_to_release
    - wrist_elbow_sequence should remain elbow_before_wrist
  source_ids: [LH_BILI_SEASON_BV1VPDNYJEPU, LH_BILI_SEASON_BV1P4DGYRE8B, LH_BILI_SEASON_BV1CJDQYUEGC, LH_BILI_SEASON_BV1CADQYGEIS]
  confidence: inferred

