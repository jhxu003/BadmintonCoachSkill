- rule_id: upper-arm-never-stabilizes
  issue: Upper arm never stabilizes for segment transfer
  category: swing_path
  priority: 34
  applicable_actions: [high_clear, smash, drop, backhand]
  student_profile_fit: [beginner, intermediate, arm_dominant]
  required_observations: [phase_observations.elbow_track]
  observable_evidence:
    - path: phase_observations.elbow_track
      equals: keeps_traveling
      label: Elbow keeps traveling through the hit, suggesting upper-arm pulling instead of segment transfer.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for preparation, elbow track, contact, and post-contact frames before diagnosing segment transfer.
  likely_effect:
    - Forearm and racket cannot overtake cleanly.
    - Internal-rotation or wrist cues become forced because the previous segment never stabilizes.
  correction_principle: Create an upper-arm stabilization moment before training forearm release or wrist detail.
  drills: [elbow-track-arm-segment-transfer]
  retest_metrics:
    - phase_observations.elbow_track should become stabilizes_before_release
    - wrist_elbow_sequence should become forearm_releases_after_elbow
