system_layers:
  - layer_id: student_fit_and_diagnosis
    role: Choose the learner path, learning order, current goal, and retest condition before isolated technical cues.
    support_topics: [diagnosis_flow, training_plan, student_fit]
    topic_window_count: 3649
    framework_ids:
      - learner-fit-sequence-frame
      - match-transfer-frame
      - mobility-safe-frame
      - tactical-observation-frame
      - equipment-fit-frame
    training_plan_ids: [one-priority-daily, match-transfer-progression]
    routing_rule: If observations are incomplete, classify level, goal, body constraints, injury risk, and match-transfer need before selecting a stroke framework.
    boundary: Counts are ASR-derived coverage signals, not exact teaching frequency.

  - layer_id: rear_court_base_and_high_clear
    role: Build arrival, front-high contact, racket-side frame, top-elbow structure, and simple release as the base for high clear and later attack.
    support_topics: [high_clear, top_elbow, racket_preparation, contact_point, safety]
    topic_window_count: 3337
    framework_ids:
      - stable-overhead-frame
      - high-clear-base-power-frame
      - high-clear-action-change-frame
      - contact-window-frame
      - top-elbow-frame
      - standard-ready-racket-frame
      - racket-face-control-frame
      - left-side-balance-frame
      - shoulder-extension-frame
      - timestamp-standard-compact-frame
    training_plan_ids: [overhead-rebuild, overhead-framework-selector]
    routing_rule: For high-clear distance or stability problems, rank arrival and contact before elbow, wrist, hip, or internal-rotation advice.
    boundary: True contact and elbow diagnosis still require visible frame/keypoint evidence from the user's video.

  - layer_id: overhead_power_chain
    role: Add lower-body drive, trunk timing, arm-path organization, grip/finger contribution, wrist release, whip, and internal-rotation proxy checks only after base frame holds.
    support_topics: [smash, internal_rotation, wrist, hip_rotation, top_elbow, contact_point, safety]
    topic_window_count: 4971
    framework_ids:
      - kinetic-chain-frame
      - whip-release-frame
      - internal-rotation-frame
      - concentrated-power-frame
      - flash-power-frame
      - relaxed-follow-through-frame
      - wrist-position-frame
      - grip-finger-power-frame
      - hip-trunk-power-frame
      - tension-observation-frame
      - arm-path-correction-frame
      - timestamp-foot-ground-hip-drive
      - timestamp-arm-segment-transfer
      - timestamp-wrist-contact-transfer
    training_plan_ids: [hip-drive-rebuild, overhead-rebuild]
    routing_rule: Treat internal rotation, wrist, and whip as release-chain outcomes; do not prescribe them when contact, frame, or safety evidence fails.
    boundary: ASR can identify candidate teaching windows, but internal rotation needs visual proxy evidence and should be worded as a proxy diagnosis.

  - layer_id: smash_variant_system
    role: Separate simple smash, heavy smash, fast smash, Bawang-style power, low-loaded smash, point smash, jump smash, angle correction, slice smash, and deceleration/release.
    support_topics: [smash, top_elbow, internal_rotation, hip_rotation, wrist, safety]
    topic_window_count: 4561
    framework_ids:
      - simple-smash-sequence-frame
      - heavy-smash-frame
      - fast-smash-frame
      - bawang-smash-frame
      - low-loaded-smash-frame
      - point-smash-frame
      - jump-smash-airtime-frame
      - smash-angle-frame
      - slice-smash-frame
      - deceleration-release-frame
      - timestamp-time-budget-frame
      - timestamp-framework-tradeoff-selector
      - timestamp-china-jump-recovery
    training_plan_ids: [jump-smash-readiness, overhead-framework-selector]
    routing_rule: Choose the smash variant by player prerequisites, incoming-ball time, desired ball effect, and recovery cost instead of saying only "more power" or "more angle".
    boundary: Elite or specialized frames must not be recommended to beginners unless prerequisites and safety are visible.

  - layer_id: drop_slice_slide_variation
    role: Treat drop, slice drop, heavy slice, deceptive drop, slide/drop, cut shot, and passive rear-point variation as separate tasks layered on base overhead disguise and contact control.
    support_topics: [drop, racket_preparation, contact_point, match_transfer]
    topic_window_count: 1627
    framework_ids:
      - slice-drop-slide-frame
      - light-drop-frame
      - heavy-slice-drop-frame
      - deceptive-drop-frame
      - cut-shot-frame
      - timestamp-drop-variant-selector
    training_plan_ids: [drop-slide-variant-rebuild]
    routing_rule: Ask which drop variant and target line the player is attempting before judging touch, slice amount, or body direction.
    boundary: Low-count categories require direct observation and should not override visible overhead base failures.

  - layer_id: footwork_arrival_recovery
    role: Diagnose rear-court and front-court movement through start, first step, arrival, body organization, contact condition, exit, and recovery to the next shot.
    support_topics: [footwork, match_transfer, safety]
    topic_window_count: 1097
    framework_ids:
      - passive-rear-transition-frame
      - start-position-recovery-frame
      - half-side-attack-frame
      - rear-court-overhead-frame
      - lazy-legs-recovery-frame
      - front-court-arrival-frame
      - elastic-footwork-frame
      - timestamp-china-jump-recovery
    training_plan_ids: [footwork-recovery-rebuild, match-transfer-progression]
    routing_rule: When the stroke breaks in rallies, check whether late arrival or poor recovery caused the technical fault before changing hand mechanics.
    boundary: Footwork load advice must respect pain, knee/ankle/back risk, and missing lower-body visibility.

  - layer_id: backhand_and_rear_corner_choice
    role: Decide whether rear-corner failure is an overhead choice, half-side transition, passive backhand, contact-height issue, face-control issue, or backhand whip/release problem.
    support_topics: [footwork, contact_point, wrist, match_transfer]
    topic_window_count: 1533
    framework_ids:
      - backhand-passive-frame
      - backhand-corner-choice-frame
      - backhand-whip-frame
      - rear-court-overhead-frame
      - whip-release-frame
      - concentrated-power-frame
    training_plan_ids: [footwork-recovery-rebuild, match-transfer-progression]
    routing_rule: Do not reduce backhand diagnosis to wrist strength until arrival, solution choice, contact height, racket face, and recovery have been checked.
    boundary: Current backhand rules are partly title-level or candidate-backed; require direct video evidence for firm advice.

  - layer_id: drive_receive_and_front_exchange
    role: Diagnose body-jammed shots, push/drive power, receive-smash defense, compact receive, high serve control, and front-court fast exchange through spacing, preparation size, face stability, and second-shot recovery.
    support_topics: [drive, serve_receive, doubles, match_transfer, safety]
    topic_window_count: 1160
    framework_ids:
      - body-jammed-drive-frame
      - push-drive-power-frame
      - receive-smash-defense-frame
      - compact-frontcourt-receive-frame
      - serve-high-clear-frame
      - front-court-arrival-frame
    training_plan_ids: [one-priority-daily, match-transfer-progression]
    routing_rule: For flat-exchange and receive failures, request ready-racket, spacing, preparation-size, and second-shot evidence before giving full-swing advice.
    boundary: Serve/receive and drive categories have fewer windows than overhead topics; keep confidence bounded.

  - layer_id: doubles_singles_tactics_and_match_transfer
    role: Connect shot quality, recovery, partner coverage, singles pressure, doubles fast exchange, and rally retests.
    support_topics: [match_transfer, doubles, drive, serve_receive, footwork]
    topic_window_count: 860
    framework_ids:
      - doubles-rear-continuity-frame
      - doubles-fast-exchange-frame
      - singles-tactical-core-frame
      - tactical-observation-frame
      - match-transfer-frame
    training_plan_ids: [match-transfer-progression]
    routing_rule: Do not infer tactics from one isolated stroke clip; require rally, partner, incoming-ball, and recovery context.
    boundary: Third-party discussion and blocked-platform sources can guide product questions only, not technical authority.

  - layer_id: safety_equipment_and_load_selection
    role: Keep pain, mobility limits, shoulder/elbow range, jump load, racket weight, and training dose inside every technical prescription.
    support_topics: [safety, training_plan, student_fit]
    topic_window_count: 2801
    framework_ids:
      - mobility-safe-frame
      - equipment-fit-frame
      - shoulder-extension-frame
      - relaxed-follow-through-frame
      - tension-observation-frame
    training_plan_ids: [one-priority-daily, footwork-recovery-rebuild, jump-smash-readiness]
    routing_rule: If pain or load risk is present, select a lower-risk frame and reduce intensity before chasing idealized form.
    boundary: This skill is not medical advice; pain requires intensity reduction and qualified professional assessment.

