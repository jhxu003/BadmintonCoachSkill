  - smash_variant_system
  - drop_slice_slide_variation
  - backhand_and_rear_corner_choice
  - drive_receive_and_front_exchange
  - doubles_singles_tactics_and_match_transfer

full_corpus_system_read:
  - system_id: full-corpus-student-fit-first
    summary: The reviewed ASR corpus supports treating diagnosis, training-plan selection, and student-fit framework choice as the first layer before isolated stroke cues.
    support_topics: [diagnosis_flow, training_plan, student_fit]
    reviewed_window_signal_count: 3761
    usage: Use to choose a learner-fit path, correction order, and retest metric before prescribing hand, elbow, hip, or footwork details.
    boundary: Agent-reviewed ASR timestamps support routing, but not Liu Hui's exact wording or a human coaching review.

  - system_id: full-corpus-safety-load-filter
    summary: Safety, pain, mobility, equipment fit, and training dose must constrain every technical framework and progression.
    support_topics: [safety, training_plan, student_fit, equipment]
    reviewed_window_signal_count: 2990
    usage: Reduce load or stop progression when pain or range limits appear; for equipment fit, compare weight, balance, torsion, or shaft response one variable at a time without replacing the technical diagnosis.
    boundary: This skill is not medical advice, cannot diagnose injury, and cannot infer equipment causality from one clip without a controlled comparison.

  - system_id: full-corpus-footwork-arrival-recovery
    summary: Footwork diagnosis is a start-to-recovery sequence involving first movement, arrival, body organization, contact condition, exit, and next-shot readiness.
    support_topics: [footwork, match_transfer, safety]
    reviewed_window_signal_count: 1189
    usage: Check movement-to-contact and recovery before changing hand mechanics when strokes fail under pressure.
    boundary: Firm movement diagnosis requires visible lower-body and rally-context evidence.

  - system_id: full-corpus-rear-court-base
    summary: Rear-court development starts with arrival, playable front-high contact, racket-side frame, top-elbow organization, and a simple safe release.
    support_topics: [high_clear, top_elbow, racket_preparation, contact_point, safety]
    reviewed_window_signal_count: 3506
    usage: Use as the base layer for high clear, smash, drop, and later overhead variation.
    boundary: Contact point, elbow position, and racket preparation require visible frame evidence.

  - system_id: full-corpus-overhead-power-chain
    summary: Overhead and smash advice should be organized around racket preparation, top-elbow frame, contact window, hip/trunk contribution, internal-rotation proxy cues, wrist/grip transfer, and safe follow-through.
    support_topics: [smash, top_elbow, internal_rotation, racket_preparation, high_clear, wrist, hip_rotation, contact_point, safety]
    reviewed_window_signal_count: 6591
    usage: Use as the main selection surface for high clear and smash reports.
    boundary: True shoulder internal rotation still requires visible frame evidence; ASR review only establishes the timestamped teaching topic.

  - system_id: full-corpus-smash-variant-selection
    summary: Simple, heavy, fast, Bawang-style, low-loaded, point, jump, angle, slice, and deceleration smash tasks require different prerequisites and recovery costs.
    support_topics: [smash, top_elbow, internal_rotation, hip_rotation, wrist, safety]
    reviewed_window_signal_count: 4786
    usage: Select the smash variant from learner prerequisites, incoming-ball time, desired ball effect, and recovery requirement.
    boundary: Specialized or high-load variants need visible prerequisites and safety evidence.

  - system_id: full-corpus-drop-variation-selection
    summary: Light drop, fast drop, heavy slice, deceptive drop, slide/drop, cut shot, and passive rear-point variation are separate geometry and disguise tasks.
    support_topics: [drop, racket_preparation, contact_point, match_transfer]
    reviewed_window_signal_count: 1679
    usage: Ask for the intended variation and target line before judging touch, slice amount, body direction, or racket face.
    boundary: Variation advice must not bypass a failed overhead base or invisible contact geometry.

  - system_id: full-corpus-backhand-rear-corner-choice
    summary: Rear-corner problems require choosing among overhead, half-side transition, passive backhand, contact-height, face-control, and whip-release solutions.
    support_topics: [footwork, contact_point, wrist, match_transfer]
    reviewed_window_signal_count: 1581
    usage: Check arrival, solution choice, contact height, face stability, and recovery before prescribing wrist strength.
    boundary: Backhand-specific support is partly inferred from cross-topic windows and requires direct video evidence.

  - system_id: full-corpus-drive-receive-fast-exchange
    summary: Drive, body-jammed, push, receive-smash, serve/receive, and front exchange depend on spacing, compact preparation, face stability, and second-shot readiness.
    support_topics: [drive, serve_receive, doubles, match_transfer, safety]
    reviewed_window_signal_count: 1260
    usage: Request ready-racket, spacing, preparation-size, and second-shot evidence before recommending a larger swing.
    boundary: These categories have lower corpus density and need direct action evidence for confident diagnosis.

  - system_id: full-corpus-transfer-before-complexity
    summary: Match-transfer, footwork, serve/receive, drive, doubles, and drop topics appear as separate transfer problems, not just stroke-shape problems.
    support_topics: [match_transfer, footwork, drop, serve_receive, drive, doubles]
    reviewed_window_signal_count: 1157
    usage: When drill form is acceptable but rallies fail, ask for incoming-ball, recovery, partner, and first-two-shot evidence before adding more technique.
    boundary: Low-count categories need direct observation and should not be over-weighted against visible overhead errors.

promotion_rules:
  - Agent-reviewed ASR timestamp summaries may influence framework ranking, diagnostic questions, and review queues.
  - Schema-validated VLM v4 still summaries may identify visible stance, arm, torso, racket-position, and visibility conditions, but not motion phase or causality.
  - Dense temporal Pose summaries may describe coarse 2D geometry change, but do not independently prove racket face, shuttle contact, force, grip pressure, calibrated 3D kinematics, or true internal rotation.
  - A narrow technical claim becomes source-backed only after human timestamp review or independent public evidence supports that exact claim.
  - Do not quote, paraphrase closely, or reconstruct raw ASR transcripts.
  - If a user asks "why did you judge this", cite visible user-video observations plus the relevant framework/rubric, not raw Liu Hui transcript text.

runtime_usage_rules:
  - Load this file after corpus-provenance and before choosing a framework when the user asks for Liu Hui system coverage.
  - Treat counts as coverage signals, not truth scores or exact quote frequency.
  - Use data/corpus/video-asr-timestamp-review.yaml for reviewed timestamp/topic routing.
  - Use skills/liu-hui-badminton-coach/references/multimodal-evidence-map.yaml to connect each source and timestamp to candidate frameworks and confidence boundaries.
  - Use data/corpus/video-visual-evidence-summary.yaml for validated sparse still visibility and data/corpus/video-temporal-pose-summary.yaml for critical-source dense geometry proxies.
  - Do not quote, paraphrase closely, or reconstruct private ASR transcripts.
  - Promote a candidate to a firm rule only after human timestamp review or independent public evidence supports the same narrow claim.
