- rule_id: body-force-window-too-long
  issue: Body force enters too long and scatters smash power
  category: smash_variant
  priority: 40
  applicable_actions: [smash]
  student_profile_fit: [intermediate, advanced, lower_body_available]
  required_observations: [phase_observations.body_force_window]
  observable_evidence:
    - path: phase_observations.body_force_window
      equals: too_long
      label: Body force starts too early or lasts too long instead of concentrating near contact.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for body line, contact, and post-contact frames before diagnosing body-force timing.
  likely_effect:
    - The action looks powerful but the shuttle receives scattered force.
    - Waist or abdomen cues may make the swing slower instead of sharper.
  correction_principle: Keep early movement relaxed, direct the body line through the shuttle, and make the burst short near contact.
  drills: [slow-chain-throw, wrist-contact-segmentation]
  retest_metrics:
    - phase_observations.body_force_window should become short_near_contact
    - phase_observations.power_quality should become concentrated
  source_ids: [LH_BILI_SEASON_BV1AYKWBJEUV, LH_BILI_SEASON_BV1BF6SYTEGZ]
  evidence_ids: [pilot-003-w003-roll-abdomen-and-short-force-window, pilot-030-w002-concentrated-force-and-contact-point, pilot-030-w003-segment-force-release-and-follow-through]
  evidence_status: timestamp_candidate
  confidence: hypothesis
