- rule_id: drill-form-rally-breakdown
  issue: Technique works in drill form but breaks in rally pressure
  category: match_transfer
  priority: 85
  applicable_actions: [high_clear, smash, drop, drive, rear_footwork, front_footwork, backhand, serve_receive, doubles, match_transfer]
  student_profile_fit: [intermediate, advanced, match_pressure_breakdown]
  required_observations: [phase_observations.drill_form_ok_rally_breaks]
  observable_evidence:
    - path: phase_observations.drill_form_ok_rally_breaks
      equals: true
      label: Technique looks acceptable in drill form but fails under rally pressure.
  min_evidence_count: 1
  insufficient_evidence_policy: Ask for a drill clip and a rally clip before claiming match-transfer breakdown.
  likely_effect:
    - The player keeps repeating isolated form work without transferring it.
    - Advice should move from single-stroke mechanics to pressure progression.
  correction_principle: Progress from slow structure to controlled feed to rally-pressure retest.
  drills: [pressure-transfer-ladder]
  retest_metrics:
    - phase_observations.drill_form_ok_rally_breaks should become false
    - phase_observations.pressure_success_rate should improve
  source_ids: [LH_BILI_MATCH_TRANSFER, LH_YT_CONSISTENCY, LH_BILI_CORE_COMPETITION, LH_BILI_SEASON_BV1YV4Y1N7GX]
