- rule_id: tactical-context-missing
  issue: Tactical advice is under-evidenced from the current clip
  category: match_transfer
  priority: 95
  applicable_actions: [high_clear, smash, drop, drive, rear_footwork, front_footwork, backhand, serve_receive, doubles, match_transfer]
  student_profile_fit: [intermediate, advanced]
  required_observations: [phase_observations.tactical_context_visible]
  observable_evidence:
    - path: phase_observations.tactical_context_visible
      equals: false
      label: Current clip does not show enough rally context for tactical diagnosis.
  min_evidence_count: 1
  insufficient_evidence_policy: Request rally context with opponent contact, player recovery, and next-shot outcome.
  likely_effect:
    - Tactical claims would be invented from one isolated stroke.
    - The correct output is a technical diagnosis plus a retake request.
  correction_principle: Keep the report technical until rally context is visible.
  drills: [rally-context-retake]
  retest_metrics:
    - phase_observations.tactical_context_visible should become true
  source_ids: [LH_YT_TACTICAL_INTEL, LH_BILI_CORE_COMPETITION, LH_YT_CONSISTENCY]
