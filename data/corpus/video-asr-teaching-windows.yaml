review_run:
  run_id: video_asr_teaching_windows_pilot_20260708
  created_at: 2026-07-08
  scope:
    - Content-level ASR pilot for 30 indexed Liu Hui public Bilibili teaching videos.
    - ASR succeeded for 25 videos and produced 90 timestamp candidate teaching windows.
    - Five videos still need acquisition fallback before content model review.
    - Public file contains original summaries only; raw ASR segments stay private.
    - All candidate teaching windows require human review before skill promotion.
  model_notes:
    rejected_model:
      model: faster-whisper tiny
      reason: Core badminton terms were unstable in the pilot and should not be used for skill distillation.
    candidate_model:
      model: mobiuslabsgmbh/faster-whisper-large-v3-turbo
      audio_scope: first_180_seconds
      result: Usable for candidate-window extraction on successful downloads; model quality is acceptable for timestamp candidate review, while Bilibili source download reliability still needs retries/fallbacks.
    fallback_model:
      model: faster-whisper small
      audio_scope: first_180_seconds
      result: Usable but less preferred than large-v3-turbo for badminton terminology and dense teaching segments.
  infrastructure_notes:
    compute_node_issue: node10 and node14 runs using shared /dataStor Python environments entered NFS wait states.
    adjusted_method: Use local preview on login only for lightweight validation; full batch should run from node-local runtime/cache/audio under /tmp or another node-local disk.

windows:
  - window_id: pilot-001-w001-learning-goal
    source_id: LH_BILI_SEASON_BV18TMUB4E8D
    evidence_id: pilot-001-lh_bili_season_bv18tmub4e8d-seg-001
    start_seconds: 0
    end_seconds: 24
    topic_tags: [smash, student_goal, heavy_smash]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The opening establishes that the learner wants a heavier rear-court smash and feels that adding effort does not make the smash heavier or steeper.
    teaching_point_candidate:
      problem: Player frames the problem as needing more force, but the coach first observes the stroke instead of prescribing more effort.
      diagnosis_rule: For heavy-smash goals, collect the player's stated goal and observe actual swings before giving power cues.
      correction: Start from goal clarification and observation, then decide whether the limiting factor is frame, timing, contact, or tension.
      promotion_target: diagnosis_flow

  - window_id: pilot-001-w002-frame-fit
    source_id: LH_BILI_SEASON_BV18TMUB4E8D
    evidence_id: pilot-001-lh_bili_season_bv18tmub4e8d-seg-001
    start_seconds: 53
    end_seconds: 68
    topic_tags: [smash, racket_preparation, power_framework, student_fit]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach treats the learner's general action as acceptable, then shifts the diagnosis to whether the racket-preparation frame fits the desired heavy-smash outcome.
    teaching_point_candidate:
      problem: A technically acceptable-looking swing can still use a preparation frame that does not match the target power style.
      diagnosis_rule: When the learner wants heavy smash but the basic action is not obviously broken, evaluate whether the chosen frame is speed-oriented or heavy-power-oriented.
      correction: Match the racket-preparation frame to the student's goal before adding more force.
      promotion_target: frameworks

  - window_id: pilot-001-w003-feed-variability
    source_id: LH_BILI_SEASON_BV18TMUB4E8D
    evidence_id: pilot-001-lh_bili_season_bv18tmub4e8d-seg-001
    start_seconds: 85
    end_seconds: 112
    topic_tags: [smash, consistency, multi_shuttle, technical_stability]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach separates feed variability from the core technical problem, implying that a robust heavy-smash mechanism should not collapse simply because multi-shuttle feeds vary.
    teaching_point_candidate:
      problem: Learners may blame inconsistent feeds for inconsistent smash quality when the deeper issue is technical stability.
      diagnosis_rule: If smash quality changes dramatically across similar feeds, check whether the power mechanism is robust before blaming the feeder or shuttle variability.
      correction: Build a stable power frame and contact pattern that tolerates normal feed variation.
      promotion_target: rubric

  - window_id: pilot-001-w004-full-power-frame
    source_id: LH_BILI_SEASON_BV18TMUB4E8D
    evidence_id: pilot-001-lh_bili_season_bv18tmub4e8d-seg-001
    start_seconds: 119
    end_seconds: 143
    topic_tags: [smash, full_power_frame, racket_preparation, power_framework]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach identifies the lack of a full-power frame as an important reason the learner cannot convert effort into heavy smash power.
    teaching_point_candidate:
      problem: The player uses a preparation state that behaves more like a speed frame than a full-power heavy-smash frame.
      diagnosis_rule: For rear-court heavy smash, distinguish speed-oriented preparation from full-power preparation before prescribing stronger arm or wrist effort.
      correction: Rebuild the heavy-smash frame first, then test whether effort transfers into shuttle speed and angle.
      promotion_target: frameworks

  - window_id: pilot-001-w005-do-not-copy-pro-frame
    source_id: LH_BILI_SEASON_BV18TMUB4E8D
    evidence_id: pilot-001-lh_bili_season_bv18tmub4e8d-seg-001
    start_seconds: 155
    end_seconds: 180
    topic_tags: [student_fit, pro_model_copying, power_framework, safety]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach warns against copying elite-player preparation styles without checking whether the learner's body conditions and prerequisites match that style.
    teaching_point_candidate:
      problem: A learner may imitate professional smash frames that depend on physical attributes or prerequisites they do not have.
      diagnosis_rule: Before recommending an advanced professional-style frame, check the learner's height, shoulder condition, jump ability, and current technical prerequisites.
      correction: Choose a student-fit frame rather than copying an elite player's visible form.
      promotion_target: student_profiles

  - window_id: pilot-002-w001-goal-observe-first
    source_id: LH_BILI_SEASON_BV1X9QBBBETX
    evidence_id: pilot-002-lh_bili_season_bv1x9qbbbetx-seg-001
    start_seconds: 1
    end_seconds: 30
    topic_tags: [smash, overhead_attack, student_goal, diagnosis_flow]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The learner frames the goal as head-side attacking and the coach asks for a trial swing before naming the limiting factor.
    teaching_point_candidate:
      problem: The learner wants a stronger head-side attack, but the visible action must be observed before prescribing a cue.
      diagnosis_rule: For head-side attack goals, ask what result the learner wants, observe one or more live attempts, then identify whether the first bottleneck is preparation speed, power frame, contact, or footwork.
      correction: Start with a task-specific observation rather than generic power advice.
      promotion_target: diagnosis_flow

  - window_id: pilot-002-w002-time-space-budget
    source_id: LH_BILI_SEASON_BV1X9QBBBETX
    evidence_id: pilot-002-lh_bili_season_bv1x9qbbbetx-seg-001
    start_seconds: 51
    end_seconds: 93
    topic_tags: [smash, overhead_attack, time_pressure, racket_preparation]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: "The coach treats a pressured overhead ball as a time-budget problem: slow racket preparation consumes most of the available interception time."
    teaching_point_candidate:
      problem: The player appears to lack power, but the deeper issue is that preparation is too slow under head-side pressure.
      diagnosis_rule: If the incoming overhead ball compresses time and space, estimate whether racket preparation is consuming the swing window before blaming strength.
      correction: Shorten and speed up preparation so the player can catch the point with usable swing time.
      promotion_target: rubric

  - window_id: pilot-002-w003-frame-by-ball-condition
    source_id: LH_BILI_SEASON_BV1X9QBBBETX
    evidence_id: pilot-002-lh_bili_season_bv1x9qbbbetx-seg-001
    start_seconds: 109
    end_seconds: 138
    topic_tags: [smash, power_framework, ball_condition, explosive_preparation]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach distinguishes active high balls from pressured half-arc or flat high balls and maps them to different preparation frameworks.
    teaching_point_candidate:
      problem: A player may use the same relaxed power frame for both active and pressured overhead situations.
      diagnosis_rule: If the opponent's ball is high and comfortable, a more power-friendly relaxed frame may fit; if the ball pushes or presses the head side, require an explosive frame entry.
      correction: Choose the frame according to the ball condition, not by a fixed visual template.
      promotion_target: frameworks

  - window_id: pilot-002-w004-borrow-elite-prep-not-elite-power
    source_id: LH_BILI_SEASON_BV1X9QBBBETX
    evidence_id: pilot-002-lh_bili_season_bv1x9qbbbetx-seg-001
    start_seconds: 140
    end_seconds: 163
    topic_tags: [student_fit, pro_model_copying, racket_preparation, safety]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach borrows the fast preparation advantage from an elite style while rejecting the full elite power method as unsuitable for many amateur bodies.
    teaching_point_candidate:
      problem: Copying an elite player's whole power method can exceed the amateur learner's physical and technical prerequisites.
      diagnosis_rule: When referencing an elite model, separate the transferable feature from the non-transferable power mechanism.
      correction: Retain fast preparation if it fits the learner, but do not require the learner to reproduce the elite power driver.
      promotion_target: student_profiles

  - window_id: pilot-002-w005-fast-prep-retest
    source_id: LH_BILI_SEASON_BV1X9QBBBETX
    evidence_id: pilot-002-lh_bili_season_bv1x9qbbbetx-seg-001
    start_seconds: 163
    end_seconds: 173
    topic_tags: [smash, feedback_loop, contact_point, racket_preparation]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: After adding the fast-preparation idea, the coach immediately retests whether the learner catches the hitting point better.
    teaching_point_candidate:
      problem: A cue is not validated until it changes the actual interception or contact result.
      diagnosis_rule: After a preparation-speed cue, retest whether the player catches the point earlier or more comfortably.
      correction: Use immediate before-after feedback to decide whether to keep, intensify, or change the cue.
      promotion_target: diagnosis_flow

  - window_id: pilot-005-w001-context-before-judgment
    source_id: LH_BILI_SEASON_BV1HBYRBCECE
    evidence_id: pilot-005-lh_bili_season_bv1hbyrbcece-seg-001
    start_seconds: 13
    end_seconds: 30
    topic_tags: [high_clear, hip_rotation, coaching_context, student_fit]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: Before rejecting a coaching phrase, the coach explicitly allows that another coach may have used it for a specific student or teaching context.
    teaching_point_candidate:
      problem: Learners often treat isolated phrases such as hip-leading or leg-leading as universal rules.
      diagnosis_rule: Check whether a cue was intended for one student's correction or as a general biomechanical rule.
      correction: Preserve context-sensitive cues, but do not turn a clipped phrase into a universal principle.
      promotion_target: diagnosis_flow

  - window_id: pilot-005-w002-force-from-foot
    source_id: LH_BILI_SEASON_BV1HBYRBCECE
    evidence_id: pilot-005-lh_bili_season_bv1hbyrbcece-seg-001
    start_seconds: 30
    end_seconds: 45
    topic_tags: [high_clear, hip_rotation, kinetic_chain, power_framework]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach states the general principle that sport power starts from the root/feet and questions whether the hip can move independently without ground push.
    teaching_point_candidate:
      problem: The learner may understand hip rotation as an isolated hip movement.
      diagnosis_rule: If a power cue asks the hip to move first, check whether it ignores the foot-ground interaction that creates the rotation.
      correction: Re-anchor hip rotation in foot pressure and ground reaction before cueing the trunk or arm.
      promotion_target: frameworks

  - window_id: pilot-005-w003-deng-before-turn
    source_id: LH_BILI_SEASON_BV1HBYRBCECE
    evidence_id: pilot-005-lh_bili_season_bv1hbyrbcece-seg-001
    start_seconds: 49
    end_seconds: 63
    topic_tags: [high_clear, hip_rotation, footwork, kinetic_chain]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: "The coach defines the sequence of kicking and turning: the push precedes the rotation, with the foot driving the hip."
    teaching_point_candidate:
      problem: A player may rotate the hip without first loading and pushing through the foot.
      diagnosis_rule: For deng-zhuan mechanics, confirm that the push action creates the rotation rather than the hip spinning by itself.
      correction: Teach the sequence as foot push first, hip turn second, then test whether the upper-body swing is easier.
      promotion_target: frameworks

  - window_id: pilot-006-w001-match-task-definition
    source_id: LH_BILI_SEASON_BV1V6ZABTEKT
    evidence_id: pilot-006-lh_bili_season_bv1v6zabtekt-seg-001
    start_seconds: 18
    end_seconds: 30
    topic_tags: [smash, match_transfer, overhead_attack, diagnosis_flow]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach narrows the learner's match problem into a far-net push / sudden attacking smash task instead of treating it as generic jump-smash power.
    teaching_point_candidate:
      problem: A broad complaint that the smash cannot finish the rally is too broad to diagnose directly.
      diagnosis_rule: Translate match complaints into a concrete incoming-ball scenario before choosing technique.
      correction: Define whether the task is far-net push, pressured head-side attack, active high ball, or another match pattern.
      promotion_target: diagnosis_flow

  - window_id: pilot-006-w002-malay-step-overrotation
    source_id: LH_BILI_SEASON_BV1V6ZABTEKT
    evidence_id: pilot-006-lh_bili_season_bv1v6zabtekt-seg-001
    start_seconds: 62
    end_seconds: 82
    topic_tags: [rear_footwork, smash, hip_rotation, match_transfer]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach says the Malay-step pattern can support sudden attack, but the learner's first step and body turn are too exaggerated.
    teaching_point_candidate:
      problem: A useful footwork pattern becomes counterproductive when the turn is too large for the match task.
      diagnosis_rule: In sudden-attack footwork, check whether the first step over-rotates the body and makes the player lie away from the shuttle path.
      correction: Reduce the turn and keep the body organized for the attack line before adding more power.
      promotion_target: footwork_rubric

  - window_id: pilot-006-w003-staged-task-before-high-ball
    source_id: LH_BILI_SEASON_BV1V6ZABTEKT
    evidence_id: pilot-006-lh_bili_season_bv1v6zabtekt-seg-001
    start_seconds: 86
    end_seconds: 146
    topic_tags: [rear_footwork, smash, training_plan, progression]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: "The coach deliberately splits the learning path: first make the sudden-attack route work, then add the higher-ball variation later."
    teaching_point_candidate:
      problem: Teaching every ball height at once can hide whether the core attack route is usable.
      diagnosis_rule: If the learner is unstable, isolate one representative ball condition before layering in higher or more complex balls.
      correction: "Use a staged progression: solve the lower sudden-attack pattern first, then add the high-ball extension."
      promotion_target: training_plans

  - window_id: pilot-006-w004-high-fast-frame
    source_id: LH_BILI_SEASON_BV1V6ZABTEKT
    evidence_id: pilot-006-lh_bili_season_bv1v6zabtekt-seg-001
    start_seconds: 151
    end_seconds: 168
    topic_tags: [smash, top_elbow, racket_preparation, explosive_preparation]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: For fast match pushes, the coach requires a high racket frame and explosive frame entry.
    teaching_point_candidate:
      problem: Slow or low preparation leaves the player late against quick pushed balls.
      diagnosis_rule: In far-net push attack training, inspect whether the frame appears high and fast enough before judging the final hit.
      correction: Raise the racket frame and create it explosively so the swing is available when the shuttle arrives.
      promotion_target: frameworks

  - window_id: pilot-007-w001-dengzhuan-definition
    source_id: LH_BILI_SEASON_BV1KM41147M1
    evidence_id: pilot-007-lh_bili_season_bv1km41147m1-seg-001
    start_seconds: 0
    end_seconds: 24
    topic_tags: [high_clear, hip_rotation, kinetic_chain, power_framework]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach defines kicking-turning power as force starting from the feet and notes that large power actions require suitable time and conditions.
    teaching_point_candidate:
      problem: Learners may try to use full kicking-turning mechanics when the ball condition does not allow the time.
      diagnosis_rule: Before prescribing full lower-body power, check whether the ball gives enough time for foot recovery, push, and hip turn.
      correction: Use full kicking-turning mechanics for heavy-power situations with sufficient conditions; use faster compact frames under pressure.
      promotion_target: frameworks

  - window_id: pilot-007-w002-rear-foot-orientation
    source_id: LH_BILI_SEASON_BV1KM41147M1
    evidence_id: pilot-007-lh_bili_season_bv1km41147m1-seg-001
    start_seconds: 31
    end_seconds: 58
    topic_tags: [footwork, hip_rotation, high_clear, kinetic_chain]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach diagnoses that if the rear foot is already pointed diagonally forward, the hip cannot rotate properly into the stroke.
    teaching_point_candidate:
      problem: The player expects hip rotation while the rear-foot orientation has already blocked the turn.
      diagnosis_rule: Check the rear foot before judging waist or hip power; if the rear foot is not set to allow rotation, the hip cannot turn correctly.
      correction: Reposition the rear foot so the lower body can push and turn the pelvis into the stroke.
      promotion_target: footwork_rubric

  - window_id: pilot-007-w003-heel-lift-and-upward-push
    source_id: LH_BILI_SEASON_BV1KM41147M1
    evidence_id: pilot-007-lh_bili_season_bv1km41147m1-seg-001
    start_seconds: 61
    end_seconds: 112
    topic_tags: [footwork, hip_rotation, kinetic_chain, body_power]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach uses jumping as an analogy to show that kicking-turning power should include heel lift, forefoot action, and an upward component rather than dead full-foot pressure.
    teaching_point_candidate:
      problem: A player stands too dead on the foot and cannot create an upward-turning push.
      diagnosis_rule: If kicking-turning feels absent, check whether the heel can release and the forefoot can finish the push as in jumping.
      correction: Load the rear foot, lift the heel appropriately, and use the leg to push the body into the turn.
      promotion_target: footwork_rubric

  - window_id: pilot-007-w004-leg-drives-hip-and-waist
    source_id: LH_BILI_SEASON_BV1KM41147M1
    evidence_id: pilot-007-lh_bili_season_bv1km41147m1-seg-001
    start_seconds: 114
    end_seconds: 143
    topic_tags: [hip_rotation, kinetic_chain, high_clear, body_power]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach connects the right-leg push to hip correction and then to waist/abdomen involvement.
    teaching_point_candidate:
      problem: Learners may treat waist/abdomen power as isolated trunk twisting.
      diagnosis_rule: Check whether the leg first drives the pelvis into position; only then assess whether the waist and abdomen are being carried into the swing.
      correction: Build the chain from rear-leg push to pelvis turn to trunk contribution.
      promotion_target: frameworks

  - window_id: pilot-007-w005-two-dengzhuan-failure-types
    source_id: LH_BILI_SEASON_BV1KM41147M1
    evidence_id: pilot-007-lh_bili_season_bv1km41147m1-seg-001
    start_seconds: 145
    end_seconds: 163
    topic_tags: [hip_rotation, footwork, diagnosis_rule, kinetic_chain]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: "The coach names two common failures: pushing only upward without turning, or pushing only forward without enough upward force."
    teaching_point_candidate:
      problem: The learner may feel they are pushing but still fail to create the intended hip/body turn.
      diagnosis_rule: Separate upward-only and forward-only push errors when diagnosing missing kicking-turning power.
      correction: Blend the upward and turning components so the push corrects the body rather than merely moving it.
      promotion_target: rubric

  - window_id: pilot-008-w001-front-contact-novice-comfort
    source_id: LH_BILI_SEASON_BV19C4Y1S7Z2
    evidence_id: pilot-008-lh_bili_season_bv19c4y1s7z2-seg-001
    start_seconds: 0
    end_seconds: 45
    topic_tags: [internal_rotation, contact_point, novice_pattern, swing]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: "The coach explains why novices prefer a very front contact point: it is easier to see and reach, but it encourages a fly-swatter style stroke."
    teaching_point_candidate:
      problem: A comfortable contact point can reinforce an incorrect swing pattern.
      diagnosis_rule: If internal rotation feels awkward, check whether the learner has placed the shuttle too far forward because it feels easier to reference.
      correction: Move the contact concept away from the default deep-front novice position before teaching internal rotation.
      promotion_target: swing_rubric

  - window_id: pilot-008-w002-deep-front-point-kills-explosiveness
    source_id: LH_BILI_SEASON_BV19C4Y1S7Z2
    evidence_id: pilot-008-lh_bili_season_bv19c4y1s7z2-seg-001
    start_seconds: 56
    end_seconds: 72
    topic_tags: [internal_rotation, contact_point, explosive_power, swing]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach argues that an excessively forward contact point forces the upper arm to travel too far, reducing explosive power.
    teaching_point_candidate:
      problem: The player cannot create explosion because the contact point demands a long arm path before impact.
      diagnosis_rule: When power feels weak despite effort, check whether the arm is chasing a contact point that is too far forward.
      correction: Reposition the hitting point so the arm can accelerate compactly into impact.
      promotion_target: swing_rubric

  - window_id: pilot-008-w003-deep-front-point-blocks-internal-rotation
    source_id: LH_BILI_SEASON_BV19C4Y1S7Z2
    evidence_id: pilot-008-lh_bili_season_bv19c4y1s7z2-seg-001
    start_seconds: 125
    end_seconds: 144
    topic_tags: [internal_rotation, contact_point, forearm, kinetic_chain]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: "The coach links deep-front contact to failed internal rotation: the forearm cannot overtake the upper-arm line in that position."
    teaching_point_candidate:
      problem: The learner tries to add internal rotation while the contact point has already made the rotation mechanically unavailable.
      diagnosis_rule: If internal rotation is absent, inspect contact-point depth before cueing the forearm.
      correction: First adjust the hitting point, then cue the upper-arm to forearm sequencing.
      promotion_target: swing_rubric

  - window_id: pilot-008-w004-force-chain-break
    source_id: LH_BILI_SEASON_BV19C4Y1S7Z2
    evidence_id: pilot-008-lh_bili_season_bv19c4y1s7z2-seg-001
    start_seconds: 145
    end_seconds: 166
    topic_tags: [internal_rotation, kinetic_chain, finger_power, swing]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: "The coach diagnoses a force-chain break: the player is using arm-to-finger tension instead of upper arm to forearm to hand to fingers."
    teaching_point_candidate:
      problem: A player may still hit the shuttle out through finger tightening while missing the larger arm sequencing.
      diagnosis_rule: If the player reports strong finger tension but lacks internal rotation, check whether the chain jumps directly from arm to fingers.
      correction: Rebuild the sequence from upper arm to forearm to hand to fingers, instead of relying on finger tightening alone.
      promotion_target: swing_rubric

  - window_id: pilot-008-w005-front-only-limitation
    source_id: LH_BILI_SEASON_BV19C4Y1S7Z2
    evidence_id: pilot-008-lh_bili_season_bv19c4y1s7z2-seg-001
    start_seconds: 169
    end_seconds: 180
    topic_tags: [internal_rotation, contact_point, rear_court, match_transfer]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: The coach notes that the front-only pattern fails when the shuttle falls farther back, especially when the player needs to press the ball down.
    teaching_point_candidate:
      problem: A stroke that only works in front of the body does not transfer to rear-court pressure.
      diagnosis_rule: Test whether the same swing can handle balls that are not ideally in front; if not, the contact and rotation model is too narrow.
      correction: Train contact and internal rotation so the player can still control rear-court downward shots.
      promotion_target: match_transfer_rubric

  - window_id: pilot-010-w001-over-sideways-and-tight-grip
    source_id: LH_BILI_SEASON_BV1A5ZGYQESP
    evidence_id: pilot-010-lh_bili_season_bv1a5zgyqesp-seg-001
    start_seconds: 12
    end_seconds: 24
    topic_tags: [overhead_attack, grip, hip_rotation, diagnosis_flow]
    evidence_level: content_model_candidate
    review_status: pending_human_review
    summary: For a head-side sudden attack, the coach first identifies excessive side-on body position and a grip that is too tight.
    teaching_point_candidate:
      problem: The player may chase attack power while body orientation and grip already block the swing.
      diagnosis_rule: For head-side sudden attack, inspect side-on degree and grip tension before adding power cues.
