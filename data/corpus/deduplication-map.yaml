deduplication_run:
  run_id: dedupe_20260708_public_metadata
  run_date: 2026-07-08
  method:
    - Normalize Bilibili URLs by BV id.
    - Treat exact BV-id matches as the same public video.
    - Treat same-topic or same-title YouTube/Bilibili/Douyin rows as not duplicates unless a stable platform id or reviewed cross-post evidence proves identity.
    - Keep platform search/profile/channel rows separate from per-video rows.
  source_inputs:
    - data/source-index.tsv before Bilibili UGC season merge
    - data/raw-private/bili-seasons-all.tsv
  summary:
    bilibili_season_episode_rows: 406
    exact_existing_bilibili_duplicates: 23
    new_bilibili_video_rows_merged: 383
    cross_platform_exact_duplicates_confirmed: 0
    cross_platform_duplicates_blocked_by_metadata_access: [YouTube, Douyin]

