    - data/corpus/video-pilot-manifest.yaml
    - data/corpus/video-corpus-manifest.yaml
  summary:
    sources_with_reviewed_asr_windows: 401
    visual_review_jobs: 396
    asr_only_sources: 5
    existing_private_vlm_sources_with_reviewed_asr: 25
    existing_private_vlm_sources_without_reviewed_asr: 5
    existing_private_vlm_sources_all_manifests: 30
    existing_private_vlm_visual_jobs: 25
    existing_private_vlm_asr_only_sources: 0
    queued_visual_sources: 371
    planned_keyframes: 5977
    priority_counts:
      high: 188
      critical: 203
      standard: 5
    target_source_counts:
      top_elbow: 278
      smash: 277
      racket_preparation: 256
      internal_rotation: 255
      high_clear: 205
      wrist: 191
      contact_point: 181
      hip_rotation: 169
      serve_receive: 90
      footwork: 86
      drive: 72
      drop: 64
      doubles: 40
  runtime_guidance:
    download_and_keyframes: Run download,keyframes with teaching-window timestamps
      on a compute node using node-local private storage.
    vlm: Use a badminton-specific visible-evidence prompt and do not infer invisible
      biomechanics.
    pose: Use pose for coarse body geometry only; it cannot see racket orientation
      or prove internal rotation.
    public_output: Commit only aggregate statuses and original summaries; keep media,
      frames, model text, and keypoints private.
  non_youtube_access_gaps:
  - platform: Douyin
    status: blocked_dynamic_profile
    last_checked: '2026-07-10'
    reason: The public profile request still returns a dynamic 404 and no stable per-video
      metadata export.
  - platform: Instagram
    status: blocked_timeout
    last_checked: '2026-07-10'
    reason: The indexed public reel timed out in both direct HTTP and yt-dlp access
      attempts.
