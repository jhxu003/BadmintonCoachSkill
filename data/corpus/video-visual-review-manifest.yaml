visual_review_run:
  run_id: non_youtube_visual_review_manifest_20260710
  created_at: '2026-07-10'
  scope:
  - All indexed Bilibili sources with agent-reviewed ASR timestamp windows.
  - YouTube is excluded by project decision.
  - Douyin and Instagram are recorded as access gaps until stable public metadata
    or media access is available.
  inputs:
    timestamp_review: data/corpus/video-asr-timestamp-review.yaml
